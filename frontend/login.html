<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueMate | Login</title>
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">Q</div>
        <h1>Queue<span style="color:var(--accent)">Mate</span></h1>
        <p>Welcome back, player</p>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-group"><span class="input-icon">✉</span>
            <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-group"><span class="input-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" required>
          </div>
        </div>
        <div class="form-error-msg" id="loginError" style="display:none;margin-bottom:10px"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">Login</button>
      </form>
      <div class="auth-switch">Don't have an account? <a href="register.html">Register here</a></div>
    </div>
  </div>
  <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script>
  <script src="js/helpers.js"></script><script src="js/ui.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'index.html';
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      if (!isValidEmail(email)) { errEl.textContent = 'Please enter a valid email.'; errEl.style.display='flex'; return; }
      if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display='flex'; return; }
      setSubmitting(btn, true);
      try {
        await loginUser(email, password);
        showToast('Logged in!', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 500);
      } catch(err) {
        errEl.textContent = err.message || 'Invalid credentials.';
        errEl.style.display = 'flex';
      } finally { setSubmitting(btn, false); }
    }
  </script>
</body>
</html>
