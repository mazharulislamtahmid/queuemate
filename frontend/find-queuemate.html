<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QueueMate | Find QueueMate</title>
  <link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <div class="app-shell">
    <aside class="sidebar-left" id="sidebarLeft"></aside>
    <main class="main-content">
      <div class="qm-header-section">
        <h2>🎮 Find QueueMate</h2>
        <p>Looking for teammates for ranked grind or casual sessions? Post your listing or browse active ones below.</p>
      </div>
      <div id="qmCreateForm"></div>
      <div class="filter-bar qm-filter-bar">
        <select id="qmFilterGame">
          <option value="">All Games</option>
          <option value="valorant">Valorant</option><option value="pubgm">PUBG Mobile</option>
          <option value="ff">Free Fire</option><option value="mlbb">Mobile Legends</option>
        </select>
        <select id="qmFilterPlay">
          <option value="">All Play Types</option>
          <option value="Casual">Casual</option><option value="Rank Push">Rank Push</option>
        </select>
        <select id="qmFilterTeam">
          <option value="">All Requirements</option>
          <option value="Duo">Duo</option><option value="2 Players">2 Players</option>
          <option value="3 Players">3 Players</option><option value="Squad">Squad</option>
          <option value="Full Team">Full Team</option>
        </select>
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="qmSearch" placeholder="Search notes or players…">
        </div>
      </div>
      <div class="section-header"><span class="section-title">Active Listings</span></div>
      <div id="qmList"></div>
    </main>
    <aside class="sidebar-right" id="sidebarRight"></aside>
  </div>
  <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script>
  <script src="js/helpers.js"></script><script src="js/ui.js"></script><script src="js/navbar.js"></script>
  <script src="js/queuemate.js"></script>
  <script>document.addEventListener('DOMContentLoaded', initQueuemate);</script>
</body>
</html>
